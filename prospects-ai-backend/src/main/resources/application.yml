server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: prospects-ai-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/prospects_ai
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:changeme-in-production-must-be-at-least-32-chars-long}
    expiration-ms: 86400000
  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    model: gpt-4o-mini
    base-url: https://api.openai.com/v1
  encryption:
    key: ${ENCRYPTION_KEY:0123456789abcdef0123456789abcdef}

logging:
  level:
    ai.prospects: DEBUG
    org.springframework.security: INFO
